description: >-
  FinOps view of Extend spend. Extend meters usage in credits, where each API
  (Parse, Extract, Classify, Split, Edit) consumes a fixed number of credits
  per page and cost equals credits per page multiplied by the plan's per-credit
  rate. Self-serve Pay As You Go and Scale plans bundle monthly credits with
  pay-as-you-go overage, while Enterprise is custom and sales-led. Per-credit
  rates and per-API credit-per-page values are not publicly enumerated, so this
  artifact is not reconciled.
notes: >-
  Per-credit rates and per-API credit consumption are subject to change and were
  not fully published at capture time; verify against the Extend pricing and
  credits documentation during reconciliation.
